<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTEP - Result</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav>
        <a href="index.html" class="logo">HTEP</a>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                <i class="fas fa-moon"></i>
            </button></li>
        </ul>
    </nav>

    <div class="container">
        <h1>Extraction Results</h1>
        <p class="subtitle" id="fileNameSub">Processing Complete</p>
        
        <div class="content-box">
            <div id="displayText" class="text-content">
                Loading text...
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <button class="btn" onclick="copyText()">Copy Text</button>
                <a href="index.html" class="btn btn-secondary">Upload New</a>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2025 HTEP Platform</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- Theme Toggle Functionality ---
            const themeToggle = document.getElementById('theme-toggle');
            const themeIcon = themeToggle ? themeToggle.querySelector('i') : null;

            // Check for saved theme preference or default to light mode
            const currentTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', currentTheme);

            // Update icon based on current theme
            if (themeIcon) {
                themeIcon.className = currentTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            }

            // Toggle theme on button click
            if (themeToggle) {
                themeToggle.addEventListener('click', () => {
                    const currentTheme = document.documentElement.getAttribute('data-theme');
                    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

                    document.documentElement.setAttribute('data-theme', newTheme);
                    localStorage.setItem('theme', newTheme);

                    // Update icon
                    if (themeIcon) {
                        themeIcon.className = newTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
                    }
                });
            }

            // --- Load extracted text ---
            const text = localStorage.getItem('extractedText');
            const fileName = localStorage.getItem('fileName');

            const textContainer = document.getElementById('displayText');
            const fileSub = document.getElementById('fileNameSub');

            if (text) {
                textContainer.innerText = text;
                fileSub.innerText = "Source: " + (fileName || "Unknown File");
            } else {
                textContainer.innerText = "No text found.";
            }
        });

        function copyText() {
            const text = document.getElementById('displayText').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("Copied!");
            });
        }
    </script>
</body>
</html>
